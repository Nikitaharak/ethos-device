<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Import (Sync Users)</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
      body {
        background: #f9f6ef;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      /* ── HEADER ── */
     .header{
  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:18px 38px 0;
  min-height:70px;
  box-sizing:border-box;
  margin-bottom:20px; 

  width:100%;
}

/* Left / Center / Right sections */
.header .left{
  display:flex;
  align-items:center;
}

.header .center{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.header .right{
  display:flex;
  align-items:center;
}

/* Logos */
.logo-main{
  height:48px;
  display:block;
}

.logo-right{
  height:48px;
  display:block;
}

/* Menu button */
.menu-back-btn{
  background:#eee;
  color:#205081;

  padding:9px 18px;
  font-size:1rem;

  border:none;
  border-radius:8px;
  font-weight:600;

  cursor:pointer;
  transition:all .15s ease;

  min-width:92px;
  
}

/* Hover */
.menu-back-btn:hover{
  background:#ffa500;
  color:#fff;
}

      /* ── APP CONTAINER ── */
      .app-container {
        width: 100%;
        max-width: 440px;
        height: 95vh;
        max-height: 700px;
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin-top: 16px;
      }

      /* ── MAIN CONTENT ── */
      .app-content {
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      /* ── FORM GRID ── */
      .form-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 14px;
      }
      .form-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .input-row {
        display: flex;
        align-items: center;
        flex: 1;
        min-width: 0;
        gap: 4px;
      }
      .input-row label {
        font-size: 13px;
        font-weight: 600;
        color: #444;
        white-space: nowrap;
        margin-bottom: 0;
        min-width: 34px;
      }
      .custom-input-group {
        display: flex;
        align-items: center;
        border: 1.5px solid #aaa;
        border-radius: 8px;
        height: 36px;
        background: #fff;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        transition: all 0.2s ease;
      }
      .custom-input-group:hover,
      .custom-input-group:focus-within {
        border-color: #f3aa51;
        box-shadow: 0 0 0 3px rgba(243,170,81,0.18);
      }
      .custom-input-group input {
        border: none;
        outline: none;
        flex: 1;
        min-width: 0;
        padding: 0 5px;
        font-family: inherit;
        font-size: 13px;
        background: transparent;
      }
      .custom-input-group .icon-btn {
        color: #555;
        padding: 0 7px;
        border-left: 1px solid #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
      }
      input[list]::-webkit-calendar-picker-indicator { display: none !important; }
      input[type="date"] { color: #333; cursor: pointer; }
      input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; padding: 0 2px; }

      /* ── CHECKBOXES ── */
      .checkbox-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 10px 0 35px 0;
        padding-right: 5px;
      }
      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      .checkbox-item input[type="checkbox"] {
        width: 30px;
        height: 30px;
        border: 1px solid #777;
        cursor: pointer;
        accent-color: #f3aa51;
      }

      /* ── SELECT ALL BUTTON ── */
      .select-all-btn {
       background: #ffa500; 
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: all 0.2s ease;
        white-space: nowrap;
      }
      .select-all-btn:hover { background: #ffa500; transform: translateY(-1px); }
      .select-all-btn.active { background: #28a745; }

      /* ── ACTION BUTTONS ── */
      .action-grid {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
      }
      .big-action-btn {
        background: #ffa500;
        border-radius: 12px;
        border: none;
        width: 110px;
        height: 110px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-family: inherit;
        color: #fff;
        transition: all 0.2s ease;
      }
      .big-action-btn:hover {
        background: #f3aa51;
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(243,170,81,0.45);
      }
      .big-action-btn .btn-text {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.2;
        text-align: center;
        margin-top: 8px;
        color: #fff;
      }
      .composite-icon {
        position: relative;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── BOTTOM BUTTONS ── */
      .bottom-actions {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: auto;
        padding-bottom: 20px;
      }
      .btn-bottom {
        background: #ffa500;
        border: none;
        padding: 6px 25px;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        border-radius: 8px;
        font-family: inherit;
        color: #fff;
        font-weight: 600;
        transition: all 0.2s ease;
      }
      .btn-bottom:hover {
        background: #e69500;
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(255,165,0,0.4);
      }

      /* ── FOOTER ── */
      .app-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 15px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #333;
        border-top: 1px solid #f0e8d8;
      }

      /* ── SYNC RESULT MODAL ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0,0,0,0.55);
        display: none;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.active { display: flex; }
      .modal-box {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        padding: 24px 28px;
        width: min(380px, 92vw);
        max-height: 85vh;
        display: flex;
        flex-direction: column;
      }
      .modal-box h3 {
        color: #205081;
        margin: 0 0 10px;
        font-size: 1.1rem;
        text-align: center;
      }
      .modal-status {
        color: #444;
        font-size: 0.9rem;
        text-align: center;
        margin: 0 0 10px;
        white-space: pre-line;
        line-height: 1.6;
      }
      .modal-hint {
        color: #888;
        font-size: 0.8rem;
        text-align: center;
        margin: 0 0 12px;
      }

      /* ── SYNC RESULT TABLE ── */
      .sync-summary {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin: 8px 0 14px;
      }
      .sync-badge {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #f5f5f5;
        border-radius: 10px;
        padding: 8px 14px;
        min-width: 72px;
        font-size: 12px;
        font-weight: 600;
        color: #555;
        border: 1.5px solid #e0e0e0;
      }
      .sync-badge .badge-count {
        font-size: 22px;
        font-weight: 700;
        line-height: 1.2;
      }
      .sync-badge.created  { border-color: #28a745; color: #28a745; background: #f0fff4; }
      .sync-badge.updated  { border-color: #ffa500; color: #b87000; background: #fffbf0; }
      .sync-badge.skipped  { border-color: #aaa;    color: #666;    background: #f9f9f9; }
      .sync-badge.errors   { border-color: #dc3545; color: #dc3545; background: #fff5f5; }

      /* ── LOG TABLE ── */
      .sync-log {
        flex: 1;
        overflow-y: auto;
        border: 1px solid #eee;
        border-radius: 8px;
        margin-bottom: 14px;
        font-size: 12px;
      }
      .sync-log table {
        width: 100%;
        border-collapse: collapse;
      }
      .sync-log th {
        background: #205081;
        color: #fff;
        padding: 6px 8px;
        text-align: left;
        position: sticky;
        top: 0;
        font-size: 11px;
      }
      .sync-log td {
        padding: 5px 8px;
        border-bottom: 1px solid #f0f0f0;
        vertical-align: middle;
      }
      .sync-log tr:last-child td { border-bottom: none; }
      .log-created { color: #28a745; font-weight: 700; }
      .log-updated { color: #e07800; font-weight: 700; }
      .log-skipped { color: #888; }
      .log-error   { color: #dc3545; font-weight: 700; }

      .modal-close-btn {
        background: #205081;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 9px 28px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        align-self: center;
      }
      .modal-close-btn:hover { background: #174069; }

      /* spinner */
      .spinner {
        display: inline-block;
        width: 28px; height: 28px;
        border: 3px solid #e0e0e0;
        border-top-color: #205081;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 6px auto 10px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* progress bar */
      .progress-wrap {
        width: 100%;
        background: #eee;
        border-radius: 20px;
        height: 8px;
        margin: 0 0 12px;
        overflow: hidden;
        display: none;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #205081, #ffa500);
        border-radius: 20px;
        width: 0%;
        transition: width 0.4s ease;
      }

      /* ── QR MODAL (added — no UI change to main page) ── */
      .qr-modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: rgba(0,0,0,0.6);
        display: none;
        align-items: center;
        justify-content: center;
      }
      .qr-modal-overlay.active { display: flex; }
      .qr-modal-box {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        padding: 28px 28px 22px;
        width: min(340px, 92vw);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .qr-modal-box h3 {
        color: #205081;
        margin: 0 0 6px;
        font-size: 1.1rem;
      }
      .qr-modal-box p {
        color: #556;
        font-size: 0.88rem;
        margin: 0 0 14px;
      }
      #qrModalImg {
        width: 220px; height: 220px;
        display: block;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        margin: 0 auto 6px;
      }
      #qrModalCanvas { width: 220px; height: 220px; margin: 0 auto 6px; display: none; }
      .qr-modal-status {
        font-size: 0.85rem;
        color: #444;
        margin: 8px 0 4px;
        min-height: 20px;
      }
      .qr-modal-hint {
        font-size: 0.78rem;
        color: #999;
        margin: 0 0 14px;
      }
      .qr-modal-cancel-btn {
        background: #eee;
        color: #205081;
        border: none;
        border-radius: 8px;
        padding: 8px 24px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.18s;
      }
      .qr-modal-cancel-btn:hover { background: #ffa500; color: #fff; }
    </style>
  </head>

  <body>

    <!-- ── HEADER ── -->
    <div class="header">
      <div class="left">
       <button class="menu-back-btn" onclick="window.location.href='/import'">
      ← Back
    </button>
      </div>

      <div style="flex:1; display:flex; align-items:center; justify-content:center;">
        <img src="/static/img/logo_company.png" class="logo-main" alt="Ethos Logo" />
      </div>
      <div style="flex:1;"></div>
      <div class="right">
        <img src="/static/img/logo_epitage.png" class="logo-right" alt="Epitage" />
      </div>
    </div>

    <!-- ── APP CARD ── -->
    <div class="app-container">
      <div class="app-content">

        <!-- Form Fields -->
        <div class="form-grid">

          <!-- Row 1: Fr ID + To ID -->
          <div class="form-row">
            <div class="input-row">
              <label for="frId">Fr ID</label>
              <div class="custom-input-group">
                <input type="text" id="frId" placeholder="Loading…" autocomplete="off" list="empIdList" />
                <div class="icon-btn"><i class="bi bi-search"></i></div>
              </div>
            </div>
            <div class="input-row">
              <label for="toId">To ID</label>
              <div class="custom-input-group">
                <input type="text" id="toId" placeholder="Loading…" autocomplete="off" list="empIdList" />
                <div class="icon-btn"><i class="bi bi-search"></i></div>
              </div>
            </div>
          </div>

          <!-- Row 2: Fr Dt + To Dt -->
          <div class="form-row">
            <div class="input-row">
              <label for="frRegDt">Fr Dt</label>
              <div class="custom-input-group">
                <input type="date" id="frRegDt" style="padding:0 8px; width:100%;" />
              </div>
            </div>
            <div class="input-row">
              <label for="toRegDt">To Dt</label>
              <div class="custom-input-group">
                <input type="date" id="toRegDt" style="padding:0 8px; width:100%;" />
              </div>
            </div>
          </div>

        </div>

        <!-- Shared datalist for employee IDs -->
        <datalist id="empIdList"></datalist>

        <!-- Checkboxes -->
        <div class="checkbox-container">
          <label class="checkbox-item" for="chkCard">
            Card <input type="checkbox" id="chkCard" checked />
          </label>
          <label class="checkbox-item" for="chkThumb">
            Thumb <input type="checkbox" id="chkThumb" checked />
          </label>
          <label class="checkbox-item" for="chkFace">
            Face <input type="checkbox" id="chkFace" checked />
          </label>
          <label class="checkbox-item" for="chkPhoto">
            Photo <input type="checkbox" id="chkPhoto" checked />
          </label>
        </div>

        <!-- Select All row -->
        <div style="display:flex; align-items:center; gap:10px; margin:-20px 0 18px 0;">
          <button type="button" id="btnSelectAll" class="select-all-btn">
            <i class="bi bi-check2-all"></i> Select All IDs
          </button>
          <span id="selAllHint" style="font-size:13px; color:#888;"></span>
        </div>

        <!-- Big Action Buttons -->
        <div class="action-grid">

          <!-- IMPORT USERS -->
          <button type="button" class="big-action-btn" id="btnImportUsers">
            <div class="composite-icon">
              <i class="bi bi-usb-drive" style="font-size:24px; position:absolute; top:-5px; left:0;"></i>
              <i class="bi bi-arrow-down" style="font-size:16px; position:absolute; top:5px; left:24px;"></i>
              <i class="bi bi-person" style="font-size:32px; position:absolute; bottom:-5px;"></i>
            </div>
            <div class="btn-text">Import<br/>Users</div>
          </button>

          <!-- DELETE USERS -->
          <button type="button" class="big-action-btn" id="btnDeleteUsers">
            <div class="composite-icon">
              <i class="bi bi-trash" style="font-size:22px; position:absolute; top:-5px;"></i>
              <i class="bi bi-person" style="font-size:32px; position:absolute; bottom:-5px;"></i>
            </div>
            <div class="btn-text">Delete<br/>Users</div>
          </button>

        </div>

        <!-- Bottom Cancel / Ok -->
        <div class="bottom-actions">
          <button type="button" class="btn-bottom" id="btnCancel">
            <i class="bi bi-x-circle"></i> Cancel
          </button>
          <button type="button" class="btn-bottom" id="btnOk">
            <i class="bi bi-check-circle"></i> Ok
          </button>
        </div>

      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>Epitage Consulting Services, Pune - 411 038</span>
        <span>+91 9850301345</span>
      </div>
    </div>


    <!-- ══════════════════════════════════
         SYNC RESULT MODAL (unchanged)
    ══════════════════════════════════ -->
    <div class="modal-overlay" id="appModal">
      <div class="modal-box">
        <h3 id="modalTitle">Import Users</h3>
        <div class="spinner" id="modalSpinner"></div>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="modal-status" id="modalStatus">Preparing…</p>

        <!-- Summary badges: Created / Updated / Skipped / Errors -->
        <div class="sync-summary" id="syncSummary" style="display:none;">
          <div class="sync-badge created">
            <span class="badge-count" id="cntCreated">0</span>
            <span>Created</span>
          </div>
          <div class="sync-badge updated">
            <span class="badge-count" id="cntUpdated">0</span>
            <span>Updated</span>
          </div>
          <div class="sync-badge skipped">
            <span class="badge-count" id="cntSkipped">0</span>
            <span>Skipped</span>
          </div>
          <div class="sync-badge errors">
            <span class="badge-count" id="cntErrors">0</span>
            <span>Errors</span>
          </div>
        </div>

        <!-- Per-user log table -->
        <div class="sync-log" id="syncLog" style="display:none;">
          <table>
            <thead>
              <tr>
                <th>User ID</th>
                <th>Name</th>
                <th>Result</th>
                <th>Reason</th>
              </tr>
            </thead>
            <tbody id="syncLogBody"></tbody>
          </table>
        </div>

        <p class="modal-hint" id="modalHint"></p>
        <button class="modal-close-btn" onclick="closeModal()">Close</button>
      </div>
    </div>


    <!-- ══════════════════════════════════
         QR MODAL (added — triggers before import)
    ══════════════════════════════════ -->
    <div class="qr-modal-overlay" id="qrModal">
      <div class="qr-modal-box">
        <h3>Scan QR to Upload File</h3>
        <p>Scan this code with your phone, then upload the Excel file from the phone page.</p>
        <img id="qrModalImg" alt="QR code" />
        <div id="qrModalCanvas"></div>
        <div class="qr-modal-status" id="qrModalStatus">Preparing token…</div>
        <div class="qr-modal-hint"   id="qrModalHint"></div>
        <button class="qr-modal-cancel-btn" id="qrModalCancelBtn">Cancel</button>
      </div>
    </div>


    <!-- ══════════════════════════════════
         INLINE QR GENERATOR (no CDN — same as import_qr page)
    ══════════════════════════════════ -->

    <script>

      // ── QR Handoff State ──
      let _qrToken   = null;
      let _qrPoll    = null;
      let _qrResolve = null;   // resolves the promise when file is received
      let _qrReject  = null;

      /* Open the QR modal and return a Promise that resolves when
         the phone has uploaded the file, or rejects on cancel/expire. */
      function showQrAndWait() {
        return new Promise(async (resolve, reject) => {
          _qrResolve = resolve;
          _qrReject  = reject;

          // Reset UI
          const imgEl      = document.getElementById('qrModalImg');
          const canvasWrap = document.getElementById('qrModalCanvas');
          const statusEl   = document.getElementById('qrModalStatus');
          const hintEl     = document.getElementById('qrModalHint');

          imgEl.src              = '';
          imgEl.style.display    = 'block';
          canvasWrap.style.display = 'none';
          canvasWrap.innerHTML   = '';
          statusEl.textContent   = 'Preparing token…';
          hintEl.textContent     = '';

          document.getElementById('qrModal').classList.add('active');

          try {
            const r = await fetch('/api/handoff_begin?mode=import');
            if (!r.ok) { _qrReject(new Error('Error starting handoff')); closeQrModal(); return; }
            const j = await r.json();
            if (!j.success) { _qrReject(new Error(j.message || 'Failed')); closeQrModal(); return; }

            _qrToken = j.token;
            const phoneUrl = j.url || j.phone_url || j.link ||
                             (location.origin + '/handoff/import/' + _qrToken);

            // Prefer server-rendered PNG QR; fall back to inline canvas
            imgEl.onload  = () => { statusEl.textContent = 'Scan the code with your phone'; };
            imgEl.onerror = () => {
              imgEl.style.display    = 'none';
              canvasWrap.style.display = 'block';
              try { new QRCode(canvasWrap).makeCode(phoneUrl); } catch(_) {}
              statusEl.textContent = 'Scan the code with your phone';
            };
            imgEl.src = '/api/qr_for_handoff/' + _qrToken + '.png';

            if (j.expires_at) hintEl.textContent = 'This code expires soon.';

            // Start polling for file upload
            clearInterval(_qrPoll);
            _qrPoll = setInterval(async () => {
              try {
                const pr = await fetch('/api/handoff_status/' + encodeURIComponent(_qrToken));
                if (!pr.ok) return;
                const pj = await pr.json();
                if (pj.exists && pj.mode === 'import' && pj.have_file) {
                  // File received — close QR modal and resolve
                  clearInterval(_qrPoll);
                  statusEl.textContent = '✅ File received! Processing…';
                  setTimeout(() => {
                    closeQrModal();
                    if (_qrResolve) _qrResolve(_qrToken);
                  }, 700);
                } else if (pj.exists && pj.expired) {
                  clearInterval(_qrPoll);
                  statusEl.textContent = 'QR expired. Please try again.';
                  setTimeout(() => {
                    closeQrModal();
                    if (_qrReject) _qrReject(new Error('QR expired'));
                  }, 1500);
                }
              } catch(_) {}
            }, 1500);

          } catch(e) {
            _qrReject(e);
            closeQrModal();
          }
        });
      }

      function closeQrModal() {
        clearInterval(_qrPoll);
        document.getElementById('qrModal').classList.remove('active');
      }

      // Cancel button inside QR modal
      document.getElementById('qrModalCancelBtn').addEventListener('click', () => {
        clearInterval(_qrPoll);
        closeQrModal();
        if (_qrReject) _qrReject(new Error('cancelled'));
        _qrResolve = _qrReject = null;
      });


      document.addEventListener("DOMContentLoaded", () => {

        // ── Load employee IDs from database ──
        (async () => {
          const frId = document.getElementById("frId");
          const toId = document.getElementById("toId");
          const list = document.getElementById("empIdList");
          try {
            const res = await fetch("/api/get_all_employee_ids");
            const j   = await res.json();
            if (j.success && Array.isArray(j.ids) && j.ids.length > 0) {
              list.innerHTML = j.ids.map(id => `<option value="${id}">`).join("");
              frId.value = j.ids[0];
              toId.value = j.ids[j.ids.length - 1];
              frId.placeholder = `From (e.g. ${j.ids[0]})`;
              toId.placeholder = `To (e.g. ${j.ids[j.ids.length - 1]})`;
            } else {
              frId.placeholder = "From ID";
              toId.placeholder = "To ID";
            }
          } catch(e) {
            frId.placeholder = "From ID";
            toId.placeholder = "To ID";
          }
        })();

        // ── Button wiring ──
        document.getElementById("btnImportUsers").addEventListener("click", () => handleImportUsers());
        document.getElementById("btnDeleteUsers").addEventListener("click", () => handleDeleteUsers());
        document.getElementById("btnCancel").addEventListener("click", () => window.location.href = "/menu");
        document.getElementById("btnOk").addEventListener("click", () => handleImportUsers());

        // ── Select All IDs ──
        document.getElementById("btnSelectAll").addEventListener("click", () => {
          const btn  = document.getElementById("btnSelectAll");
          const hint = document.getElementById("selAllHint");
          const frId = document.getElementById("frId");
          const toId = document.getElementById("toId");
          if (btn.classList.contains("active")) {
            frId.placeholder = "From ID";
            toId.placeholder = "To ID";
            btn.innerHTML = '<i class="bi bi-check2-all"></i> Select All IDs';
            btn.classList.remove("active");
            hint.textContent = "";
          } else {
            frId.value = ""; toId.value = "";
            frId.placeholder = "ALL"; toId.placeholder = "ALL";
            btn.innerHTML = '<i class="bi bi-x-circle"></i> Clear Selection';
            btn.classList.add("active");
            hint.textContent = "✔ All employees selected";
          }
        });

        ["frId","toId"].forEach(id => {
          document.getElementById(id).addEventListener("input", () => {
            const btn = document.getElementById("btnSelectAll");
            if (btn.classList.contains("active")) {
              btn.innerHTML = '<i class="bi bi-check2-all"></i> Select All IDs';
              btn.classList.remove("active");
              document.getElementById("selAllHint").textContent = "";
              document.getElementById("frId").placeholder = "From ID";
              document.getElementById("toId").placeholder = "To ID";
            }
          });
        });

      }); // end DOMContentLoaded


      /* ── Collect form values ── */
      function getFormData() {
        return {
          from_id:       document.getElementById("frId").value.trim(),
          to_id:         document.getElementById("toId").value.trim(),
          from_dt:       document.getElementById("frRegDt").value.trim(),
          to_dt:         document.getElementById("toRegDt").value.trim(),
          include_card:  document.getElementById("chkCard").checked,
          include_thumb: document.getElementById("chkThumb").checked,
          include_face:  document.getElementById("chkFace").checked,
          include_photo: document.getElementById("chkPhoto").checked,
        };
      }


      /* ══════════════════════════════════════════════════════
         IMPORT USERS — now starts with QR scan step,
         then proceeds with the existing Device A → B sync logic.
      ══════════════════════════════════════════════════════ */
      async function handleImportUsers() {
        const fd = getFormData();

        if (!fd.include_card && !fd.include_thumb && !fd.include_face && !fd.include_photo) {
          alert("Please select at least one data type (Card, Thumb, Face, or Photo).");
          return;
        }

        // ── Step 0: Show QR modal and wait for phone to upload file ──
        let handoffToken;
        try {
          handoffToken = await showQrAndWait();
        } catch(e) {
          if (e.message !== 'cancelled') {
            openModal("Import Users");
            showSpinner(false);
            setModalStatus("❌ QR handoff failed: " + e.message);
          }
          return;
        }

        // ── Steps 1–3: Existing import sync flow (unchanged) ──
        openModal("Import Users");
        setModalStatus("Connecting to Device A…");
        showSpinner(true);
        hideSyncResults();

        try {

          // ── Step 1: Fetch users from Device A (source) ──
          setModalStatus("Fetching users from Device A…");
          setProgress(10);

          const fetchRes = await fetch("/api/get_users_from_device_a", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ...fd, handoff_token: handoffToken })
          });

          if (!fetchRes.ok) {
            showSpinner(false);
            setModalStatus("❌ Failed to connect to Device A\n" + fetchRes.statusText);
            return;
          }

          const fetchJson = await fetchRes.json();
          if (!fetchJson.success) {
            showSpinner(false);
            setModalStatus("❌ " + (fetchJson.message || "Could not fetch users from Device A"));
            return;
          }

          const usersFromA = fetchJson.users || [];
          if (usersFromA.length === 0) {
            showSpinner(false);
            setModalStatus("⚠ No users found on Device A matching the selected filters.");
            return;
          }

          setModalStatus(`Found ${usersFromA.length} user(s) on Device A.\nComparing with Device B…`);
          setProgress(40);

          // ── Step 2: Send to Device B for timestamp-aware sync ──
          const syncRes = await fetch("/api/import_sync_users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              ...fd,
              handoff_token: handoffToken,
              users: usersFromA
            })
          });

          setProgress(85);

          if (!syncRes.ok) {
            showSpinner(false);
            setModalStatus("❌ Sync to Device B failed\n" + syncRes.statusText);
            return;
          }

          const syncJson = await syncRes.json();
          setProgress(100);
          showSpinner(false);

          if (!syncJson.success) {
            setModalStatus("❌ " + (syncJson.message || "Sync failed"));
            return;
          }

          // ── Step 3: Show results ──
          const summary = syncJson.summary || {};
          const results = syncJson.results || [];

          document.getElementById("cntCreated").textContent = summary.created ?? 0;
          document.getElementById("cntUpdated").textContent = summary.updated ?? 0;
          document.getElementById("cntSkipped").textContent = summary.skipped ?? 0;
          document.getElementById("cntErrors").textContent  = summary.errors  ?? 0;

          const tbody = document.getElementById("syncLogBody");
          tbody.innerHTML = "";
          results.forEach(r => {
            const tr = document.createElement("tr");
            const actionClass = {
              created: "log-created",
              updated: "log-updated",
              skipped: "log-skipped",
              error:   "log-error"
            }[r.action] || "";
            const actionLabel = {
              created: "✅ Created",
              updated: "🔄 Updated",
              skipped: "⏭ Skipped",
              error:   "❌ Error"
            }[r.action] || r.action;

            tr.innerHTML = `
              <td>${r.user_id || "—"}</td>
              <td>${r.name   || "—"}</td>
              <td class="${actionClass}">${actionLabel}</td>
              <td style="color:#666;">${r.reason || ""}</td>
            `;
            tbody.appendChild(tr);
          });

          setModalStatus("✅ Sync complete!");
          setModalHint(`Total: ${usersFromA.length} user(s) processed`);

          document.getElementById("syncSummary").style.display = "flex";
          if (results.length > 0) {
            document.getElementById("syncLog").style.display = "block";
          }

        } catch(e) {
          showSpinner(false);
          setModalStatus("❌ Network error: " + e.message);
        }
      }


      /* ══════════════════════════════════
         DELETE USERS (unchanged)
      ══════════════════════════════════ */
      async function handleDeleteUsers() {
        const pw = prompt("Enter admin password to delete users:");
        if (pw === null) return;

        openModal("Delete Users");
        setModalStatus("Deleting users…");
        showSpinner(true);
        hideSyncResults();

        try {
          const res = await fetch("/api/delete_filtered_users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ...getFormData(), admin_password: pw })
          });

          const j = await res.json();
          showSpinner(false);

          if (!j.success) {
            setModalStatus("❌ Failed: " + (j.message || "Incorrect password or server error"));
            return;
          }

          setModalStatus("✅ " + (j.message || `Deleted ${j.deleted} user(s) successfully.`));
          if (j.errors && j.errors.length > 0) {
            setModalHint("Some errors: " + j.errors.slice(0, 3).join(", "));
          }

        } catch(e) {
          showSpinner(false);
          setModalStatus("❌ Network error: " + e.message);
        }
      }


      /* ══════════════════════════════════
         MODAL HELPERS (unchanged)
      ══════════════════════════════════ */
      function openModal(title) {
        document.getElementById("modalTitle").textContent  = title;
        document.getElementById("modalStatus").textContent = "";
        document.getElementById("modalHint").textContent   = "";
        document.getElementById("progressBar").style.width = "0%";
        document.getElementById("progressWrap").style.display = "none";
        hideSyncResults();
        document.getElementById("appModal").classList.add("active");
      }

      function closeModal() {
        document.getElementById("appModal").classList.remove("active");
      }

      function setModalStatus(msg) { document.getElementById("modalStatus").textContent = msg; }
      function setModalHint(msg)   { document.getElementById("modalHint").textContent   = msg || ""; }

      function showSpinner(v) {
        document.getElementById("modalSpinner").style.display = v ? "inline-block" : "none";
      }

      function setProgress(pct) {
        const wrap = document.getElementById("progressWrap");
        const bar  = document.getElementById("progressBar");
        wrap.style.display = "block";
        bar.style.width = pct + "%";
      }

      function hideSyncResults() {
        document.getElementById("syncSummary").style.display = "none";
        document.getElementById("syncLog").style.display     = "none";
        document.getElementById("syncLogBody").innerHTML     = "";
      }

    </script>

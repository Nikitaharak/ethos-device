<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Export (Scan QR)</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
      body {
        background: #f9f6ef;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      /* ── HEADER ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 38px 0;
        min-height: 60px;
        box-sizing: border-box;
        width: 100%;
      }
      .logo-main  { height: 44px; display: block; }
      .logo-right { height: 44px; display: block; }
      .menu-back-btn {
        background: #eee;
        color: #205081;
        padding: 9px 18px;
        font-size: 1rem;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background .16s;
        min-width: 92px;
        margin-right: 12px;
      }
      .menu-back-btn:hover { background: #ffa500; color: #fff; }

      /* ── APP CONTAINER ── */
      .app-container {
        width: 100%;
        max-width: 440px;
        height: 95vh;
        max-height: 700px;
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin-top: 16px;
      }

      /* ── MAIN CONTENT ── */
      .app-content {
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }

      /* ── FORM GRID ── */
      .form-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 14px;
      }
      .form-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .input-row {
        display: flex;
        align-items: center;
        flex: 1;
        min-width: 0;
        gap: 4px;
      }
      .input-row label {
        font-size: 13px;
        font-weight: 600;
        color: #444;
        white-space: nowrap;
        margin-bottom: 0;
        min-width: 34px;
      }
      .custom-input-group {
        display: flex;
        align-items: center;
        border: 1.5px solid #aaa;
        border-radius: 8px;
        height: 36px;
        background: #fff;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        transition: all 0.2s ease;
      }
      .custom-input-group:hover,
      .custom-input-group:focus-within {
        border-color: #f3aa51;
        box-shadow: 0 0 0 3px rgba(243,170,81,0.18);
      }
      .custom-input-group input {
        border: none;
        outline: none;
        flex: 1;
        min-width: 0;
        padding: 0 5px;
        font-family: inherit;
        font-size: 13px;
        background: transparent;
      }
      .custom-input-group .icon-btn {
        color: #555;
        padding: 0 7px;
        border-left: 1px solid #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* ── CHECKBOXES ── */
      .checkbox-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 10px 0 35px 0;
        padding-right: 5px;
      }
      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      .checkbox-item input[type="checkbox"] {
        width: 30px;
        height: 30px;
        border: 1px solid #777;
        cursor: pointer;
        accent-color: #f3aa51;
      }

      /* ── ACTION BUTTONS ── */
      .action-grid {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
      }
      .big-action-btn {
        background: #ffa500;
        border-radius: 12px;
        border: none;
        width: 110px;
        height: 110px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-family: inherit;
        color: #fff;
        transition: all 0.2s ease;
      }
      .big-action-btn:hover {
        background: #f3aa51;
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(243,170,81,0.45);
      }
      .big-action-btn .btn-text {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.2;
        text-align: center;
        margin-top: 8px;
        color: #fff;
      }
      .composite-icon {
        position: relative;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── BOTTOM BUTTONS ── */
      .bottom-actions {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: auto;
        padding-bottom: 20px;
      }
      .btn-bottom {
        background: #ffa500;
        border: none;
        padding: 6px 25px;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        border-radius: 8px;
        font-family: inherit;
        color: #fff;
        font-weight: 600;
        transition: all 0.2s ease;
      }
      .btn-bottom:hover {
        background: #e69500;
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(255,165,0,0.4);
      }

      /* ── FOOTER ── */
      .app-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 15px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #b7b7b7;
        border-top: 1px solid #f0e8d8;
      }

      input[type="text"]::-webkit-calendar-picker-indicator { display: none; }

      /* Datalist / autocomplete styling */
      input[list] { cursor: pointer; }
      input[list]::-webkit-calendar-picker-indicator { display: none !important; }

      /* Date input styling */
      input[type="date"] {
        color: #333;
        cursor: pointer;
      }
      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        opacity: 0.6;
        padding: 0 2px;
      }
      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 1;
      }

      /* ── SELECT ALL BUTTON ── */
      .select-all-btn {
      background: #ffa500; 
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: all 0.2s ease;
        white-space: nowrap;
      }
      .select-all-btn:hover {
        background: #ffa500;
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(255,165,0,0.35);
      }
      .select-all-btn.active {
        background: #28a745;
      }

      /* ── MODAL OVERLAY ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0,0,0,0.55);
        display: none;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.active { display: flex; }
      .modal-box {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        padding: 28px 32px;
        text-align: center;
        width: min(340px, 90vw);
      }
      .modal-box h3 {
        color: #205081;
        margin: 0 0 12px;
        font-size: 1.15rem;
      }
      .modal-status {
        color: #444;
        font-size: 0.95rem;
        min-height: 20px;
        margin: 0 0 14px;
      }
      .modal-hint {
        color: #888;
        font-size: 0.82rem;
        min-height: 16px;
        margin: 0 0 18px;
      }
      .modal-qr-img {
        width: 220px;
        height: 220px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        margin: 0 auto 10px;
        display: none;
      }
      .modal-qr-canvas {
        width: 220px;
        height: 220px;
        margin: 0 auto 10px;
        display: none;
      }
      .modal-close-btn {
        background: #ffa500;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 9px 28px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      .modal-close-btn:hover { background: #174069; }

      /* spinner */
      .spinner {
        display: inline-block;
        width: 28px; height: 28px;
        border: 3px solid #e0e0e0;
        border-top-color: #205081;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 8px auto 12px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>

    <!-- ── HEADER ── -->
    <div class="header">
      <div class="left">
        <button class="menu-back-btn" onclick="window.location.href='/import'">
          ← Back
        </button>
      </div>
      <div style="flex:1; display:flex; align-items:center; justify-content:center;">
        <img src="/static/img/logo_company.png" class="logo-main" alt="Ethos Logo" />
      </div>
      <div class="right">
        <img src="/static/img/logo_epitage.png" class="logo-right" alt="Epitage" />
      </div>
    </div>

    <!-- ── APP CARD ── -->
    <div class="app-container">

      <div class="app-content">

        <!-- Form Fields -->
        <div class="form-grid">

          <!-- Row 1: Fr ID + To ID -->
          <div class="form-row">
            <div class="input-row">
              <label for="frId">Fr ID</label>
              <div class="custom-input-group">
                <input type="text" id="frId" placeholder="From ID" />
                <div class="icon-btn"><i class="bi bi-search"></i></div>
              </div>
            </div>
            <div class="input-row">
              <label for="toId">To ID</label>
              <div class="custom-input-group">
                <input type="text" id="toId" placeholder="To ID" />
                <div class="icon-btn"><i class="bi bi-search"></i></div>
              </div>
            </div>
          </div>

          <!-- Row 2: Fr Dt + To Dt -->
          <div class="form-row">
            <div class="input-row">
              <label for="frRegDt">Fr Dt</label>
              <div class="custom-input-group">
                <input type="date" id="frRegDt" style="padding:0 8px; width:100%;" />
              </div>
            </div>
            <div class="input-row">
              <label for="toRegDt">To Dt</label>
              <div class="custom-input-group">
                <input type="date" id="toRegDt" style="padding:0 8px; width:100%;" />
              </div>
            </div>
          </div>

        </div>

        <!-- Shared datalist for employee IDs -->
        <datalist id="empIdList"></datalist>

        <!-- Checkboxes -->
        <div class="checkbox-container">
          <label class="checkbox-item" for="chkCard">
            Card
            <input type="checkbox" id="chkCard" checked />
          </label>
          <label class="checkbox-item" for="chkThumb">
            Thumb
            <input type="checkbox" id="chkThumb" checked />
          </label>
          <label class="checkbox-item" for="chkFace">
            Face
            <input type="checkbox" id="chkFace" checked />
          </label>
          <label class="checkbox-item" for="chkPhoto">
            Photo
            <input type="checkbox" id="chkPhoto" checked />
          </label>
        </div>

        <!-- Select All row -->
        <div style="display:flex; align-items:center; gap:10px; margin:-20px 0 18px 0;">
          <button type="button" id="btnSelectAll" class="select-all-btn">
            <i class="bi bi-check2-all"></i> Select All IDs
          </button>
          <span id="selAllHint" style="font-size:13px; color:#888;"></span>
        </div>

        <!-- Big Action Buttons -->
        <div class="action-grid">

          <!-- EXPORT USERS -->
          <button type="button" class="big-action-btn" id="btnExportUsers">
            <div class="composite-icon">
              <i class="bi bi-usb-drive"  style="font-size:24px; position:absolute; top:-5px; left:0;"></i>
              <i class="bi bi-arrow-up"   style="font-size:16px; position:absolute; top:5px;  left:24px;"></i>
              <i class="bi bi-person"     style="font-size:32px; position:absolute; bottom:-5px;"></i>
            </div>
            <div class="btn-text">Export<br/>Users</div>
          </button>

          <!-- DELETE USERS -->
          <button type="button" class="big-action-btn" id="btnDeleteUsers">
            <div class="composite-icon">
              <i class="bi bi-trash"  style="font-size:22px; position:absolute; top:-5px;"></i>
              <i class="bi bi-person" style="font-size:32px; position:absolute; bottom:-5px;"></i>
            </div>
            <div class="btn-text">Delete<br/>Users</div>
          </button>

        </div>

        <!-- Bottom Cancel / Ok -->
        <div class="bottom-actions">
          <button type="button" class="btn-bottom" id="btnCancel">
            <i class="bi bi-x-circle"></i> Cancel
          </button>
          <button type="button" class="btn-bottom" id="btnOk">
            <i class="bi bi-check-circle"></i> Ok
          </button>
        </div>

      </div>

      <!-- Footer -->
      <div class="app-footer">
        <span>Epitage Consulting Services, Pune - 411 038</span>
        <span>+91 9850301345</span>
      </div>

    </div><!-- end app-container -->


    <!-- ══════════════════════════════════
         MODAL (shared for export + delete)
    ══════════════════════════════════ -->
    <div class="modal-overlay" id="appModal">
      <div class="modal-box">
        <h3 id="modalTitle">Export Users</h3>
        <div class="spinner" id="modalSpinner"></div>
        <p class="modal-status" id="modalStatus">Preparing…</p>
        <img  class="modal-qr-img"    id="modalQrImg"    src="" alt="QR Code" />
        <div  class="modal-qr-canvas" id="modalQrCanvas"></div>
        <p class="modal-hint" id="modalHint"></p>
        <button class="modal-close-btn" onclick="closeModal()">Close</button>
      </div>
    </div>


    <!-- ══════════════════════════════════
         SCRIPTS
    ══════════════════════════════════ -->
    <script>

      document.addEventListener("DOMContentLoaded", () => {

        // ── Load employee IDs for autocomplete ──
        (async () => {
          const frId = document.getElementById("frId");
          const toId = document.getElementById("toId");
          const list = document.getElementById("empIdList");
          try {
            const res = await fetch("/api/get_all_employee_ids");
            const j   = await res.json();
            if (j.success && Array.isArray(j.ids) && j.ids.length > 0) {
              list.innerHTML = j.ids.map(id => `<option value="${id}">`).join("");
              const first = j.ids[0];
              const last  = j.ids[j.ids.length - 1];
              frId.placeholder = `From (e.g. ${first})`;
              toId.placeholder = `To (e.g. ${last})`;
              frId.value = first;
              toId.value = last;
            }
          } catch(e) {
            frId.placeholder = "From ID";
            toId.placeholder = "To ID";
          }
        })();

        // ── Button wiring ──
        document.getElementById("btnExportUsers").addEventListener("click", handleExportUsers);
        document.getElementById("btnDeleteUsers").addEventListener("click", handleDeleteUsers);
        document.getElementById("btnCancel").addEventListener("click", () => {
          window.location.href = "/import";
        });
        document.getElementById("btnOk").addEventListener("click", handleExportUsers);

        // ── Select All IDs toggle ──
        document.getElementById("btnSelectAll").addEventListener("click", () => {
          const btn  = document.getElementById("btnSelectAll");
          const hint = document.getElementById("selAllHint");
          const frId = document.getElementById("frId");
          const toId = document.getElementById("toId");

          if (btn.classList.contains("active")) {
            frId.value = "";
            toId.value = "";
            frId.placeholder = "From ID";
            toId.placeholder = "To ID";
            btn.innerHTML = '<i class="bi bi-check2-all"></i> Select All IDs';
            btn.classList.remove("active");
            hint.textContent = "";
          } else {
            frId.value = "";
            toId.value = "";
            frId.placeholder = "ALL";
            toId.placeholder = "ALL";
            btn.innerHTML = '<i class="bi bi-x-circle"></i> Clear Selection';
            btn.classList.add("active");
            hint.textContent = "✔ All employees selected";
          }
        });

        // Auto-deactivate Select All when user types
        ["frId", "toId"].forEach(id => {
          document.getElementById(id).addEventListener("input", () => {
            const btn  = document.getElementById("btnSelectAll");
            const hint = document.getElementById("selAllHint");
            if (btn.classList.contains("active")) {
              btn.innerHTML = '<i class="bi bi-check2-all"></i> Select All IDs';
              btn.classList.remove("active");
              hint.textContent = "";
              document.getElementById("frId").placeholder = "From ID";
              document.getElementById("toId").placeholder = "To ID";
            }
          });
        });

      });


      /* ── Collect form values ── */
      function getFormData() {
        // Convert date input (YYYY-MM-DD) to DD/MM/YYYY for backend
        function fmtDate(val) {
          if (!val) return "";
          const parts = val.split("-");
          if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
          return val;
        }
        return {
          from_id:       document.getElementById("frId").value.trim(),
          to_id:         document.getElementById("toId").value.trim(),
          from_dt:       fmtDate(document.getElementById("frRegDt").value),
          to_dt:         fmtDate(document.getElementById("toRegDt").value),
          include_card:  document.getElementById("chkCard").checked,
          include_thumb: document.getElementById("chkThumb").checked,
          include_face:  document.getElementById("chkFace").checked,
          include_photo: document.getElementById("chkPhoto").checked,
        };
      }


      /* ══════════════════════════════════
         EXPORT USERS
         Flow:
           1. POST /api/export_filtered_handoff  (filters → server builds ZIP + token)
           2. Server returns token + QR URL
           3. Show QR in modal → phone scans → downloads ZIP
      ══════════════════════════════════ */
      async function handleExportUsers() {
        const fd = getFormData();

        // Validate: at least one checkbox selected
        if (!fd.include_card && !fd.include_thumb && !fd.include_face && !fd.include_photo) {
          alert("Please select at least one data type (Card, Thumb, Face, or Photo).");
          return;
        }

        openModal("Export Users");
        setModalStatus("Building export package…");
        showSpinner(true);
        hideQR();

        try {
          // Single API call: filters in → token + QR out
          const res = await fetch("/api/export_filtered_handoff", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(fd)
          });

          const j = await res.json();
          showSpinner(false);

          if (!j.success) {
            setModalStatus("❌ Export failed: " + (j.message || "Unknown error"));
            return;
          }

          // Show result summary
          setModalStatus(
            `✅ ${j.user_count} user(s) ready. Scan QR with your phone to download.`
          );
          setModalHint(`ZIP size: ${j.zip_size_kb} KB  •  Filters: ${j.filter_summary}`);

          // Show QR — prefer server PNG, fallback to canvas
          showQR(j.qr_url, j.handoff_url);

        } catch (e) {
          showSpinner(false);
          setModalStatus("❌ Network error: " + e.message);
        }
      }


      /* ══════════════════════════════════
         DELETE USERS
      ══════════════════════════════════ */
      async function handleDeleteUsers() {
        const pw = prompt("Enter admin password to delete users:");
        if (pw === null) return;

        openModal("Delete Users");
        setModalStatus("Deleting users…");
        showSpinner(true);
        hideQR();

        try {
          // Include ALL form filters + admin password
          const payload = {
            ...getFormData(),
            admin_password: pw
          };

          const res = await fetch("/api/delete_filtered_users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          // Check if response is actually JSON (guards against 404 HTML pages)
          const contentType = res.headers.get("content-type") || "";
          if (!contentType.includes("application/json")) {
            showSpinner(false);
            setModalStatus("❌ Server error: endpoint not found (check app.py)");
            return;
          }

          const j = await res.json();
          showSpinner(false);

          if (!j.success) {
            setModalStatus("❌ Failed: " + (j.message || "Incorrect password or server error"));
            return;
          }

          setModalStatus("✅ " + (j.message || `Deleted ${j.deleted} user(s) successfully.`));
          if (j.errors && j.errors.length > 0) {
            setModalHint("Warnings: " + j.errors.slice(0, 3).join(", "));
          }

        } catch (e) {
          showSpinner(false);
          setModalStatus("❌ Network error: " + e.message);
        }
      }


      /* ══════════════════════════════════
         MODAL HELPERS
      ══════════════════════════════════ */
      function openModal(title) {
        document.getElementById("modalTitle").textContent  = title;
        document.getElementById("modalStatus").textContent = "";
        document.getElementById("modalHint").textContent   = "";
        document.getElementById("appModal").classList.add("active");
      }

      function closeModal() {
        document.getElementById("appModal").classList.remove("active");
      }

      function setModalStatus(msg) {
        document.getElementById("modalStatus").textContent = msg;
      }

      function setModalHint(msg) {
        document.getElementById("modalHint").textContent = msg || "";
      }

      function showSpinner(visible) {
        document.getElementById("modalSpinner").style.display = visible ? "inline-block" : "none";
      }

      function hideQR() {
        const img = document.getElementById("modalQrImg");
        const cvs = document.getElementById("modalQrCanvas");
        img.style.display = "none";
        img.src = "";
        cvs.style.display = "none";
        cvs.innerHTML = "";
      }

      function showQR(qrUrl, fallbackUrl) {
        const img = document.getElementById("modalQrImg");
        const cvs = document.getElementById("modalQrCanvas");
        img.onload  = () => { img.style.display = "block"; };
        img.onerror = () => {
          img.style.display = "none";
          if (fallbackUrl) {
            cvs.style.display = "block";
            try { new QRCode(cvs).makeCode(fallbackUrl); } catch(_) {}
          }
        };
        img.src = qrUrl;
      }

    </script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Slot Master</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/clock-picker.css">
<style>
* { box-sizing: border-box; }
body { background:#f9f6ef; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; margin:0; min-height:100vh; }

.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 32px 0;
}
.logo-main { height:44px; }
.logo-right { height:34px; }
.menu-back-btn {
  background:#eee; color:#205081; padding:9px 18px; font-size:1rem;
  border:none; border-radius:8px; font-weight:600; cursor:pointer;
}
.menu-back-btn:hover { background:#ffa500; color:#fff; }

.container {
  max-width:440px; margin:24px auto; background:#fff; border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.12); padding:28px 28px 22px;
}
h2 {
  color:#205081; font-weight:700; margin:0 0 22px; font-size:1.25rem;
  display:flex; align-items:center; gap:8px;
}

/* ── FORM: label above, full-width rounded inputs ── */
.form-section { margin-bottom:20px; }
.field-group { margin-bottom:14px; }
.field-row { display:flex; gap:12px; }
.field-row .field-group { flex:1; }
.field-group label {
  display:block; font-size:11px; font-weight:700; color:#6b7a8d;
  text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px;
}
.field-group input,
.field-group select {
  width:100%; height:42px; padding:0 14px;
  border:1.5px solid #dce1e8; border-radius:12px;
  font-size:14px; font-family:inherit; color:#333; background:#fff;
  transition:all .2s;
}
.field-group input::placeholder { color:#b0b8c4; }
.field-group input:focus,
.field-group select:focus {
  outline:none; border-color:#ffa500;
  box-shadow:0 0 0 3px rgba(255,165,0,0.12);
}
.field-group input[readonly] { background:#f5f5f5; color:#888; }
.field-group input[data-clock-picker] { background:#fff; color:#333; cursor:pointer !important; }

.form-actions { display:flex; gap:10px; margin-top:6px; }
.btn-save {
  background:#ffa500; color:#fff; border:none; border-radius:10px;
  font-weight:600; padding:10px 22px; font-size:14px; cursor:pointer;
  display:flex; align-items:center; gap:6px;
}
.btn-save:hover { background:#e69500; }
.btn-reset {
  background:#f0f2f5; color:#555; border:1.5px solid #dde3eb;
  border-radius:10px; font-weight:600; padding:10px 18px; font-size:14px; cursor:pointer;
}
.btn-reset:hover { background:#e8edf3; }

/* ── TABLE ── */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th {
  background:#205081; color:#fff;
  padding:9px 10px; font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.4px; text-align:center; white-space:nowrap;
}
th:first-child { border-radius:8px 0 0 0; }
th:last-child  { border-radius:0 8px 0 0; }
td {
  padding:8px 10px; text-align:center; font-size:13px; color:#333;
  border-bottom:1px solid #f0f0f0; white-space:nowrap;
}
tr:hover td { background:#fff8f0; }
.td-code { font-weight:700; color:#205081; }
.td-shift {
  background:#fff3e0; color:#e68a00; padding:2px 10px;
  border-radius:10px; font-size:11px; font-weight:700; display:inline-block;
}
.td-time { font-family:monospace; font-weight:600; color:#555; font-size:13px; }
.btn-tbl {
  border:none; border-radius:5px; padding:4px 10px; font-size:11px;
  font-weight:600; cursor:pointer; margin:2px;
}
.btn-tbl-edit { background:#ffa500; color:#fff; }
.btn-tbl-edit:hover { background:#e69500; }
.btn-tbl-del { background:#fff; color:#dc3545; border:1px solid #dc3545; }
.btn-tbl-del:hover { background:#dc3545; color:#fff; }
.empty-msg { text-align:center; padding:24px; color:#bbb; font-size:13px; }

.app-footer {
  max-width:560px; margin:0 auto; padding:12px 15px;
  font-size:13px; font-weight:600; color:#b7b7b7; text-align:center;
}
</style>
</head>
<body>

<div class="header">
  <button class="menu-back-btn" onclick="location.href='/shift_config'"><i class="fa fa-arrow-left"></i> back</button>
  <img src="/static/img/logo_company.png" class="logo-main" alt="Logo">
  <img src="/static/img/logo_epitage.png" class="logo-right" alt="Epitage">
</div>

<div class="container">
  <h2><i class="fa fa-clock"></i> Time Slot Master</h2>

  <div class="form-section">
    <div class="field-group">
      <label>Shift</label>
      <select id="shift_sel"></select>
    </div>

    <div class="field-row">
      <div class="field-group">
        <label>Slot Code</label>
        <input id="slot_code" type="text" maxlength="16" placeholder="e.g. SLOT_01">
      </div>
      <div class="field-group">
        <label>Slot Name</label>
        <input id="slot_name" type="text" placeholder="e.g. Breakfast">
      </div>
    </div>

    <div class="field-row">
      <div class="field-group">
        <label>From</label>
        <input id="from_time" type="text" readonly data-clock-picker placeholder="HH:MM" style="cursor:pointer;">
      </div>
      <div class="field-group">
        <label>To</label>
        <input id="to_time" type="text" readonly data-clock-picker placeholder="HH:MM" style="cursor:pointer;">
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-save" onclick="addOrUpdateSlot()"><i class="fa fa-check"></i> Save</button>
      <button class="btn-reset" onclick="resetForm()"><i class="fa fa-rotate-left"></i> Reset</button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="slot_table">
      <thead><tr><th>Code</th><th>Name</th><th>Shift</th><th>From</th><th>To</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="app-footer">Epitage Consulting Services, Pune - 411 038</div>

<script>
let slots=[],shifts=[],edit_code=null;

function load(){
  fetch('/api/time_slot_master/list').then(r=>r.json()).then(data=>{
    slots=data.slots||[];
    shifts=data.shifts||[];
    document.getElementById('shift_sel').innerHTML=
      shifts.map(s=>`<option value="${s.shift_code}">${s.shift_name}</option>`).join('');
    const tbody=document.querySelector("#slot_table tbody");
    if(!slots.length){
      tbody.innerHTML='<tr><td colspan="6" class="empty-msg">No time slots configured yet</td></tr>';
      return;
    }
    tbody.innerHTML=slots.map(x=>{
      const sn=(shifts.find(s=>s.shift_code==x.shift_code)||{}).shift_name||'';
      return `<tr>
        <td class="td-code">${x.slot_code}</td>
        <td>${x.slot_name}</td>
        <td><span class="td-shift">${sn}</span></td>
        <td class="td-time">${x.from_time}</td>
        <td class="td-time">${x.to_time}</td>
        <td>
          <button class="btn-tbl btn-tbl-edit" onclick="edit('${x.slot_code}')"><i class="fa fa-pen"></i></button>
          <button class="btn-tbl btn-tbl-del" onclick="delSlot('${x.slot_code}')"><i class="fa fa-trash"></i></button>
        </td>
      </tr>`;
    }).join('');
  });
}

function addOrUpdateSlot(){
  const body={
    slot_code:document.getElementById('slot_code').value.trim(),
    shift_code:document.getElementById('shift_sel').value,
    slot_name:document.getElementById('slot_name').value.trim(),
    from_time:document.getElementById('from_time').value,
    to_time:document.getElementById('to_time').value
  };
  const url=edit_code?"/api/time_slot_master/update":"/api/time_slot_master/add";
  if(edit_code) body.slot_code=edit_code;
  fetch(url,{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(()=>{edit_code=null;load();resetForm();});
}

function edit(code){
  const x=slots.find(s=>s.slot_code==code);
  if(!x)return;
  document.getElementById('slot_code').value=x.slot_code;
  document.getElementById('slot_code').readOnly=true;
  document.getElementById('slot_name').value=x.slot_name;
  document.getElementById('shift_sel').value=x.shift_code;
  document.getElementById('from_time').value=x.from_time;
  document.getElementById('to_time').value=x.to_time;
  edit_code=x.slot_code;
  document.getElementById('slot_code').scrollIntoView({behavior:'smooth',block:'center'});
}

function delSlot(code){
  if(!confirm("Delete this slot?"))return;
  fetch("/api/time_slot_master/delete",{
    method:"POST",headers:{'Content-Type':'application/json'},
    body:JSON.stringify({slot_code:code})
  }).then(()=>load());
}

function resetForm(){
  ['slot_code','slot_name','from_time','to_time'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('slot_code').readOnly=false;
  edit_code=null;
}

window.onload=load;
</script>
<script src="/static/js/clock-picker.js"></script>
<div id="osk" class="simple-keyboard"></div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-keyboard@latest/build/css/index.css">
<link rel="stylesheet" href="/static/css/osk.css">
<script src="https://cdn.jsdelivr.net/npm/simple-keyboard@latest/build/index.min.js"></script>
<script src="/static/js/osk.js" defer></script>
</body>
</html>
